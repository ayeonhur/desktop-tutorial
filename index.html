<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React CDN Movie App</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM CDN (18 development) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Babel CDN (JSX 변환용) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ----------------------------------------------------
        // 1. 이미지 자동 폴백 컴포넌트 (확장자 체크 및 에러 시 숨김)
        // ----------------------------------------------------
        const AutoImage = ({ movieId, index, className, altText }) => {
            // 시도할 확장자 목록
            const extensions = ['jpg', 'png', 'webp'];
            const [extIndex, setExtIndex] = useState(0);
            const [isFailed, setIsFailed] = useState(false);

            if (isFailed) return null; // 모든 확장자가 없으면 렌더링하지 않음 (숨김 처리)

            const currentExt = extensions[extIndex];
            const imageSrc = `/images/${movieId}${index}.${currentExt}`;

            const handleError = () => {
                if (extIndex < extensions.length - 1) {
                    // 다음 확장자로 재시도
                    setExtIndex(extIndex + 1);
                } else {
                    // 모든 확장자 실패 시 숨김 상태로 변경
                    setIsFailed(true);
                }
            };

            return (
                <img 
                    src={imageSrc} 
                    onError={handleError} 
                    className={`object-cover ${className}`} 
                    alt={altText || `Movie Image ${index}`} 
                />
            );
        };

        // ----------------------------------------------------
        // 2. MovieCard 컴포넌트 (영화 목록 개별 항목)
        // ----------------------------------------------------
        const MovieCard = ({ movie, onClick }) => {
            return (
                <div 
                    onClick={onClick}
                    class="bg-slate-800 rounded-xl overflow-hidden shadow-lg hover:shadow-2xl hover:scale-105 transition-all duration-300 cursor-pointer border border-slate-700 flex flex-col"
                >
                    {/* 썸네일로 첫 번째 이미지(1번) 사용 */}
                    <div class="w-full h-64 bg-slate-800 flex items-center justify-center">
                        <AutoImage 
                            movieId={movie.id} 
                            index={1} 
                            className="w-full h-full" 
                            altText={`${movie.title} 썸네일`}
                        />
                    </div>
                    <div class="p-5 flex-1 flex flex-col justify-between">
                        <div>
                            <h2 class="text-xl font-bold text-white mb-2 line-clamp-1">{movie.title}</h2>
                            <p class="text-slate-400 text-sm line-clamp-3 leading-relaxed">
                                {movie.description || movie.overview}
                            </p>
                        </div>
                        <div class="mt-4 text-indigo-400 font-semibold text-sm">
                            자세히 보기 &rarr;
                        </div>
                    </div>
                </div>
            );
        };

        // ----------------------------------------------------
        // 3. MovieDetail 컴포넌트 (영화 상세 페이지)
        // ----------------------------------------------------
        const MovieDetail = ({ movie, onBack }) => {
            // 1번부터 9번까지의 이미지 인덱스 배열
            const imageIndices = [1, 2, 3, 4, 5, 6, 7, 8, 9];

            return (
                <div class="max-w-6xl mx-auto animate-fade-in">
                    <button 
                        onClick={onBack} 
                        class="mb-8 flex items-center px-4 py-2 bg-slate-800 hover:bg-slate-700 text-white rounded-lg transition-colors border border-slate-700 shadow-md"
                    >
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                        </svg>
                        목록으로 돌아가기
                    </button>

                    <div class="bg-slate-800 rounded-2xl p-8 mb-10 shadow-xl border border-slate-700">
                        <h1 class="text-4xl md:text-5xl font-extrabold text-white mb-6 tracking-tight">{movie.title}</h1>
                        <p class="text-lg text-slate-300 leading-relaxed mb-8">
                            {movie.description || movie.overview}
                        </p>
                    </div>

                    <h3 class="text-2xl font-bold text-white mb-6 border-b border-slate-700 pb-2">갤러리</h3>
                    
                    {/* 이미지 갤러리 그리드 */}
                    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
                        {imageIndices.map(index => (
                            <div key={index} class="rounded-xl overflow-hidden shadow-lg bg-slate-800 aspect-video flex items-center justify-center">
                                <AutoImage 
                                    movieId={movie.id} 
                                    index={index} 
                                    className="w-full h-full object-cover hover:scale-110 transition-transform duration-500" 
                                    altText={`${movie.title} 이미지 ${index}`}
                                />
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // ----------------------------------------------------
        // 4. App 컴포넌트 (상태 관리 및 조건부 렌더링)
        // ----------------------------------------------------
        const App = () => {
            const [movies, setMovies] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedMovie, setSelectedMovie] = useState(null);

            // 데이터 비동기 로딩
            useEffect(() => {
                fetch('data.json')
                    .then(response => {
                        if (!response.ok) throw new Error("데이터를 불러오는데 실패했습니다.");
                        return response.json();
                    })
                    .then(data => {
                        setMovies(data);
                        setLoading(false);
                    })
                    .catch(error => {
                        console.error("Error fetching data:", error);
                        setLoading(false);
                    });
            }, []);

            // 로딩 화면
            if (loading) {
                return (
                    <div class="min-h-screen flex flex-col items-center justify-center">
                        <div class="w-16 h-16 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                        <h2 class="text-2xl font-semibold text-slate-300 animate-pulse">로딩 중...</h2>
                    </div>
                );
            }

            // 메인 렌더링
            return (
                <div class="container mx-auto px-6 py-12">
                    {selectedMovie ? (
                        /* 상세 페이지 뷰 */
                        <MovieDetail 
                            movie={selectedMovie} 
                            onBack={() => setSelectedMovie(null)} 
                        />
                    ) : (
                        /* 영화 목록 뷰 (Card Board) */
                        <div>
                            <header class="mb-12 text-center">
                                <h1 class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400 mb-4">
                                    무비 컬렉션
                                </h1>
                                <p class="text-slate-400">당신이 좋아하는 영화를 찾아보세요.</p>
                            </header>
                            
                            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                                {movies.map(movie => (
                                    <MovieCard 
                                        key={movie.id} 
                                        movie={movie} 
                                        onClick={() => setSelectedMovie(movie)} 
                                    />
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // React 앱 마운트
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    
    <!-- 간단한 페이드인 애니메이션을 위한 CSS 추가 -->
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</body>
</html>
